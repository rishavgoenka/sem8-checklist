<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>4th Sem Checklist</title>
    <link rel="icon" type="image/svg+xml" href="./favicon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css" />
    <link rel="stylesheet" href="./styles.css" />
    <script src="./theme.js"></script>
    <script>
        window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };
    </script>
    <script defer src="/_vercel/insights/script.js"></script>
    <script>
        window.si = window.si || function () { (window.siq = window.siq || []).push(arguments); };
    </script>
    <script defer src="/_vercel/speed-insights/script.js"></script>
</head>

<body>

    <header class="page-header home-header">
        <div class="header-inner">
            <div class="header-title-wrapper">
                <div class="header-title">
                    <i class="ti ti-checklist" aria-hidden="true"></i>
                    4th Sem Checklist
                </div>
                <div class="header-sub">Prepare systematically for your semester examinations</div>
            </div>
            <div class="header-actions">
                <button class="theme-toggle-btn" onclick="themeManager.toggle()" aria-label="Toggle theme">
                    <i class="ti ti-moon theme-toggle-icon" aria-hidden="true"></i> <span
                        class="theme-toggle-label">Dark Mode</span>
                </button>
            </div>
        </div>
    </header>

    <main class="main home-main" role="main">
        <section class="subject-group">
            <div class="subject-grid">
                <!-- Cyber Security -->
                <a href="./cyber-security/" class="subject-card card-cyberlaw">
                    <div class="card-header">
                        <div class="subject-icon icon-cyberlaw">
                            <i class="ti ti-shield-lock" aria-hidden="true"></i>
                        </div>
                        <h2 class="subject-title">Cyber Security</h2>
                    </div>
                    <div class="card-footer">
                        <span>Checklist &amp; study notes</span>
                        <span class="action-link">View <i class="ti ti-arrow-right" aria-hidden="true"></i></span>
                    </div>
                </a>
            </div>
        </section>
    </main>

    <footer class="page-footer" role="contentinfo">
        Keep pushing forward
    </footer>

</body>

</html>
